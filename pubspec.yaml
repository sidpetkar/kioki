name: memory_card_game
description: "Kioki — a minimalist memory card game."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  flutter_svg: ^2.0.17
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/kioki-logo.png
    - assets/heart-icon.svg
    - assets/diamond-icon.svg
    - assets/spade-icon.svg
    - assets/club-icon.svg
